<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uno Realistic | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unna:wght@700&family=Inter:wght@400;700;900&display=swap');
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --input-bg: #222222;
            --accent: #e63946;
            --text-primary: #ffffff;
            --text-secondary: #8899aa;
        }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-primary); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .zentrix-logo { font-family: 'Unna', serif; font-size: 64px; letter-spacing: 12px; text-align: center; margin-top: 60px; text-transform: uppercase; color: #fff; }
        .game-subtitle { text-align: center; letter-spacing: 6px; color: #556677; font-size: 14px; font-weight: 700; margin-top: 10px; margin-bottom: 40px; text-transform: uppercase; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { to { transform: rotate(360deg); } }
        .card-hover:hover { transform: translateY(-15px) scale(1.1)!important; z-index: 50; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" th:inline="none">
        /*<![CDATA[*/
        const { useState, useEffect, useRef, useCallback } = React;
        const THEME = { red: "#d62828", green: "#2d6a4f", blue: "#1d3557", yellow: "#e9b000", wild: "#1a1a2e" };

        function Lobby({ onEnterGame }) {
            const [activeTab, setActiveTab] = useState("create");
            const [playerName, setPlayerName] = useState("");
            const [joinCode, setJoinCode] = useState("");
            const [loading, setLoading] = useState(false);

            const handleAction = async () => {
                if (!playerName.trim()) return alert("Enter name");
                setLoading(true);
                try {
                    const endpoint = activeTab === "create" ? `/api/uno/create` : `/api/uno/join`;
                    const res = await fetch(endpoint, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ playerName, roomId: joinCode })
                    });
                    const data = await res.json();
                    if (data.error) alert(data.error);
                    else onEnterGame(data.roomId, data.playerNum, playerName);
                } catch (e) { alert("Error"); }
                setLoading(false);
            };

            const s = {
                card: { background: "var(--card-bg)", borderRadius: 32, width: 440, padding: "40px 30px", margin: "0 auto", animation: "fadeIn 0.6s" },
                tabs: { display: "flex", background: "#0f0f0f", borderRadius: 16, padding: 6, marginBottom: 35 },
                tab: (active) => ({ flex: 1, padding: "14px", borderRadius: 12, border: "none", cursor: "pointer", background: active ? "#333" : "transparent", color: active ? "#fff" : "#666", fontWeight: 900, fontSize: 13, textTransform: "uppercase" }),
                input: { width: "100%", background: "var(--input-bg)", border: "1px solid #333", borderRadius: 16, padding: "18px 20px", color: "#fff", fontSize: 16, marginBottom: 30, boxSizing: "border-box" },
                btn: { width: "100%", background: "#fff", color: "#000", border: "none", borderRadius: 18, padding: "22px", fontSize: 15, fontWeight: 900, textTransform: "uppercase", cursor: "pointer" }
            };

            return (
                <div style={{ padding: 20, textAlign: "center" }}>
                    <div className="zentrix-logo">Zentrix</div>
                    <div className="game-subtitle">Uno Realistic Multiplayer</div>
                    <div style={s.card}>
                        <div style={s.tabs}><button style={s.tab(activeTab === "create")} onClick={()=>setActiveTab("create")}>Create Room</button><button style={s.tab(activeTab === "join")} onClick={()=>setActiveTab("join")}>Join Room</button></div>
                        <input style={s.input} value={playerName} onChange={e=>setPlayerName(e.target.value)} placeholder="Your Name" />
                        {activeTab === "join" && <input style={{...s.input, textTransform:"uppercase", textAlign:"center", fontSize:24, letterSpacing:8}} value={joinCode} onChange={e=>setJoinCode(e.target.value)} placeholder="000000" maxLength={6}/>}
                        <button style={s.btn} onClick={handleAction} disabled={loading}>{loading ? "Initializing..." : activeTab === "create" ? "Create Room Code" : "Join Room Now"}</button>
                    </div>
                </div>
            );
        }

        function Card({ card, small = false, onClick }) {
            const color = THEME[card.color] || THEME.wild;
            return (
                <div onClick={onClick} style={{
                    width: small ? 50 : 100, height: small ? 75 : 150, background: color, borderRadius: small ? 6 : 12,
                    border: "2px solid #fff3", display: "flex", alignItems: "center", justifyContent: "center",
                    position: "relative", cursor: onClick ? "pointer" : "default", boxShadow: "0 4px 12px #0008",
                    flexShrink: 0
                }}>
                    <div style={{ color: "#fff", fontSize: small ? 10 : 20, fontWeight: 900, textAlign: "center" }}>{card.value}</div>
                </div>
            );
        }

        function Game({ roomId, playerNum, playerName }) {
            const [state, setState] = useState(null);
            const [wildColor, setWildColor] = useState(null);
            const stompRef = useRef(null);

            useEffect(() => {
                const socket = new SockJS('/ws-chat');
                const stomp = Stomp.over(socket);
                stomp.debug = () => {};
                stomp.connect({}, () => {
                    stomp.subscribe(`/topic/uno/${roomId}/${playerNum}`, (msg) => setState(JSON.parse(msg.body)));
                    stomp.send(`/app/uno/${roomId}/subscribe`, {}, "{}");
                });
                stompRef.current = stomp;
                return () => stomp.disconnect();
            }, [roomId, playerNum]);

            const play = (card) => {
                if (state?.turn !== playerNum) return;
                if (card.color === 'wild') {
                    const c = prompt("Choose color: red, green, blue, yellow");
                    if (['red','green','blue','yellow'].includes(c)) {
                        stompRef.current.send(`/app/uno/${roomId}/play`, {}, JSON.stringify({ player: playerNum, cardId: card.id, color: c }));
                    }
                } else {
                    stompRef.current.send(`/app/uno/${roomId}/play`, {}, JSON.stringify({ player: playerNum, cardId: card.id }));
                }
            };

            const draw = () => stompRef.current.send(`/app/uno/${roomId}/draw`, {}, JSON.stringify({ player: playerNum }));

            if (!state) return <div style={{ textAlign: "center", marginTop: 200 }}>Connecting...</div>;

            if (state.status === 'waiting') {
                return (
                    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                        <div style={{ background: "#161616", borderRadius: 32, padding: 60, textAlign: "center" }}>
                            <div style={{ color: "var(--accent)", fontSize: 24, fontWeight: 900, letterSpacing: 4, marginBottom: 15 }}>ARENA CREATED</div>
                            <div style={{ fontSize: 64, fontWeight: 900, letterSpacing: 12, padding: 30, background: "#000", borderRadius: 20, marginBottom: 40 }}>{roomId}</div>
                            <div style={{ color: "#666", letterSpacing: 2 }}>WAITING FOR OPPONENT...</div>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ padding: 40, textAlign: "center" }}>
                    <div style={{ marginBottom: 40 }}>
                        <div style={{ color: "var(--accent)", fontSize: 18, fontWeight: 900 }}>TOP CARD</div>
                        <div style={{ display: "flex", justifyContent: "center", marginTop: 20, gap: 40 }}>
                            <Card card={state.topCard} />
                            <div style={{ textAlign: "left" }}>
                                <div style={{ fontSize: 32, fontWeight: 900 }}>{state.activeColor.toUpperCase()}</div>
                                <div style={{ color: "#666" }}>Next Turn: {state.turn === 1 ? state.p1Name : state.p2Name}</div>
                                <div style={{ marginTop: 10, color: "#fff9" }}>{state.lastMessage}</div>
                            </div>
                        </div>
                    </div>

                    <div style={{ marginBottom: 40 }}>
                        <div style={{ color: "#666" }}>Opponent has {state.oppCount} cards</div>
                        <div style={{ display: "flex", justifyContent: "center", gap: -20, marginTop: 10 }}>
                             {[...Array(state.oppCount)].map((_, i) => <div key={i} style={{ width: 30, height: 45, background: "#333", border: "1px solid #000", borderRadius: 4, marginLeft: -15 }}></div>)}
                        </div>
                    </div>

                    <div style={{ background: "rgba(255,255,255,0.02)", padding: 40, borderRadius: 32 }}>
                        <div style={{ marginBottom: 20, fontWeight: 900 }}>YOUR HAND ({state.hand.length})</div>
                        <div style={{ display: "flex", justifyContent: "center", gap: 10, flexWrap: "wrap" }}>
                            {state.hand.map(c => <Card key={c.id} card={c} onClick={() => play(c)} />)}
                            <div onClick={draw} style={{ width: 100, height: 150, background: "#000", border: "2px dashed #444", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
                                <div style={{ fontWeight: 900, color: "#666" }}>DRAW</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState("lobby");
            const [data, setData] = useState(null);
            if (view === "lobby") return <Lobby onEnterGame={(roomId, playerNum, playerName) => { setData({ roomId, playerNum, playerName }); setView("game"); }} />;
            return <Game {...data} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        /*]]>*/
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${user.username + ' • Profile'}">Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> ZENTRIX</div>
        <div style="flex: 1; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 20px;">
            <a th:href="@{/logout}" style="color: var(--text-muted); font-weight: 800; text-decoration: none; font-size: 13px;">LOGOUT</a>
            <a th:href="@{/profile}">
                <img th:src="${session.user.profilePhotoUrl != null} ? ${session.user.profilePhotoUrl} : 'https://ui-avatars.com/api/?name=User&background=10B981&color=fff'" 
                     style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--secondary);">
            </a>
        </div>
    </nav>

    <div class="app-wrapper">
        <!-- RESTORED OLD SIDEBAR -->
        <aside class="sidebar">
            <a th:href="@{/dashboard}" class="sidebar-link"><i class="fas fa-home"></i> <span>Feed</span></a>
            <a th:href="@{/explore}" class="sidebar-link"><i class="fas fa-compass"></i> <span>Explore</span></a>
            <a th:href="@{/events}" class="sidebar-link"><i class="fas fa-calendar-alt"></i> <span>Events</span></a>
            <a th:href="@{/achievements}" class="sidebar-link"><i class="fas fa-medal"></i> <span>Awards</span></a>
            <a th:href="@{/profile}" class="sidebar-link active"><i class="fas fa-user-circle"></i> <span>Profile</span></a>
            <a th:href="@{/logout}" class="sidebar-link" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></a>
        </aside>

        <main class="content-main">
            <!-- Profile Hero Area -->
            <div style="background: white; padding: 50px; border-radius: 30px; border: 1px solid var(--border); display: flex; gap: 40px; align-items: center; margin-bottom: 50px;">
                <img th:src="${user.profilePhotoUrl != null} ? ${user.profilePhotoUrl} : 'https://ui-avatars.com/api/?name=' + ${user.username} + '&background=10B981&color=fff'" 
                     style="width: 140px; height: 140px; border-radius: 50%; border: 4px solid var(--secondary); padding: 4px;">
                <div style="flex: 1;">
                    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 10px;">
                        <h1 style="font-size: 2.5rem; font-weight: 900;" th:text="${user.username}">Username</h1>
                        <button th:if="${isOwnProfile}" class="btn-primary-elite" style="background: var(--secondary); color: var(--primary-dark); padding: 8px 20px; font-size: 12px;">EDIT PROFILE</button>
                    </div>
                    <p style="color: var(--text-main); font-weight: 500; margin-bottom: 25px;" th:text="${user.aboutMe != null ? user.aboutMe : 'An elite member of the Zentrix community.'}">Bio</p>
                    <div style="display: flex; gap: 40px;">
                        <div style="text-align: center;"><span style="display: block; font-size: 24px; font-weight: 900; color: var(--primary);" th:text="${#lists.size(posts)}">0</span><span style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase;">Posts</span></div>
                        <div style="text-align: center;"><span style="display: block; font-size: 24px; font-weight: 900; color: var(--primary);" th:text="${followersCount}">0</span><span style="font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase;">Followers</span></div>
                    </div>
                </div>
            </div>

            <!-- Posts Area -->
            <h2 style="font-size: 1.5rem; font-weight: 900; margin-bottom: 30px;">Zentrix <span style="color: var(--primary);">Timeline</span></h2>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                <div th:each="post : ${posts}" style="aspect-ratio: 1; border-radius: 20px; overflow: hidden; background: #eee;">
                    <img th:if="${post.mediaUrl != null and post.mediaType == 'IMAGE'}" th:src="@{${post.mediaUrl}}" style="width: 100%; height: 100%; object-fit: cover;">
                    <video th:if="${post.mediaUrl != null and post.mediaType == 'VIDEO'}" th:src="@{${post.mediaUrl}}" style="width: 100%; height: 100%; object-fit: cover;"></video>
                    <div th:if="${post.mediaUrl == null}" style="padding: 20px; display: flex; align-items: center; justify-content: center; height: 100%; text-align: center;">
                        <p style="font-size: 12px; font-weight: 700;" th:text="${post.content}">Post text...</p>
                    </div>
                </div>
            </div>
            <div th:if="${#lists.isEmpty(posts)}" style="text-align: center; padding: 100px 0; opacity: 0.5;">
                <p>No moments shared yet.</p>
            </div>
        </main>
    </div>

</body>

</html>

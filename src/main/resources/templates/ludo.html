<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ludo King | Zentrix</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unna:wght@700&family=Inter:wght@400;700;900&display=swap');
        :root {
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --input-bg: #222222;
            --accent: #ffc107;
            --text-primary: #ffffff;
            --text-secondary: #8899aa;
        }
        body { margin: 0; background-color: var(--bg-dark); color: var(--text-primary); font-family: 'Inter', sans-serif; min-height: 100vh; }
        .zentrix-logo { font-family: 'Unna', serif; font-size: 64px; letter-spacing: 12px; text-align: center; margin-top: 60px; text-transform: uppercase; color: #fff; }
        .game-subtitle { text-align: center; letter-spacing: 6px; color: #556677; font-size: 14px; font-weight: 700; margin-top: 10px; margin-bottom: 40px; text-transform: uppercase; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .ludo-grid { display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr); width: 600px; height: 600px; background: #fff; border: 5px solid #333; margin: 0 auto; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .cell { border: 1px solid #ddd; }
        .red { background: #ff4d4d; }
        .green { background: #4dff4d; }
        .yellow { background: #ffcc00; }
        .blue { background: #4d94ff; }
        .home { background: #333; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" th:inline="none">
        /*<![CDATA[*/
        const { useState, useEffect, useRef } = React;

        function Lobby({ onEnterGame }) {
            const [activeTab, setActiveTab] = useState("create");
            const [playerName, setPlayerName] = useState("");
            const [joinCode, setJoinCode] = useState("");
            const [loading, setLoading] = useState(false);

            const handleAction = async () => {
                if (!playerName.trim()) return alert("Enter name");
                setLoading(true);
                try {
                    const endpoint = activeTab === "create" ? `/api/ludo/create` : `/api/ludo/join`;
                    const res = await fetch(endpoint, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ playerName, roomId: joinCode })
                    });
                    const data = await res.json();
                    if (data.error) alert(data.error);
                    else onEnterGame(data.roomId, data.playerIndex, playerName);
                } catch (e) { alert("Error connecting"); }
                setLoading(false);
            };

            const s = {
                card: { background: "var(--card-bg)", borderRadius: 32, width: 440, padding: "40px 30px", margin: "0 auto", animation: "fadeIn 0.6s" },
                tabs: { display: "flex", background: "#0f0f0f", borderRadius: 16, padding: 6, marginBottom: 35 },
                tab: (active) => ({ flex: 1, padding: "14px", borderRadius: 12, border: "none", cursor: "pointer", background: active ? "#333" : "transparent", color: active ? "#fff" : "#666", fontWeight: 900, fontSize: 13, textTransform: "uppercase" }),
                input: { width: "100%", background: "var(--input-bg)", border: "1px solid #333", borderRadius: 16, padding: "18px 20px", color: "#fff", fontSize: 16, marginBottom: 30, boxSizing: "border-box" },
                btn: { width: "100%", background: "#fff", color: "#000", border: "none", borderRadius: 18, padding: "22px", fontSize: 15, fontWeight: 900, textTransform: "uppercase", cursor: "pointer" }
            };

            return (
                <div style={{ padding: 20, textAlign: "center" }}>
                    <div className="zentrix-logo">Zentrix</div>
                    <div className="game-subtitle">Ludo King Multiplayer</div>
                    <div style={s.card}>
                        <div style={s.tabs}><button style={s.tab(activeTab === "create")} onClick={()=>setActiveTab("create")}>Create Room</button><button style={s.tab(activeTab === "join")} onClick={()=>setActiveTab("join")}>Join Room</button></div>
                        <input style={s.input} value={playerName} onChange={e=>setPlayerName(e.target.value)} placeholder="Your Name" />
                        {activeTab === "join" && <input style={{...s.input, textTransform:"uppercase", textAlign:"center", fontSize:24, letterSpacing:8}} value={joinCode} onChange={e=>setJoinCode(e.target.value)} placeholder="000000" maxLength={6}/>}
                        <button style={s.btn} onClick={handleAction} disabled={loading}>{loading ? "Initializing..." : activeTab === "create" ? "Create Room Code" : "Join Room Now"}</button>
                    </div>
                </div>
            );
        }

        function Game({ roomId, playerIndex, playerName }) {
            const [state, setState] = useState(null);
            const stompRef = useRef(null);

            useEffect(() => {
                const socket = new SockJS('/ws-chat');
                const stomp = Stomp.over(socket);
                stomp.debug = () => {};
                stomp.connect({}, () => {
                    stomp.subscribe(`/topic/ludo/${roomId}`, (msg) => setState(JSON.parse(msg.body)));
                    stomp.send(`/app/ludo/${roomId}/subscribe`, {}, "{}");
                });
                stompRef.current = stomp;
                return () => stomp.disconnect();
            }, [roomId]);

            const roll = () => stompRef.current.send(`/app/ludo/${roomId}/roll`, {}, JSON.stringify({ playerIndex }));
            const move = (pieceIdx) => stompRef.current.send(`/app/ludo/${roomId}/move`, {}, JSON.stringify({ playerIndex, pieceIdx }));

            if (!state) return <div style={{ textAlign: "center", marginTop: 200 }}>Connecting...</div>;

            if (state.status === 'waiting') {
                return (
                    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                        <div style={{ background: "#161616", borderRadius: 32, padding: 60, textAlign: "center" }}>
                            <div style={{ color: "var(--accent)", fontSize: 24, fontWeight: 900, letterSpacing: 4, marginBottom: 15 }}>Lobby Created</div>
                            <div style={{ fontSize: 64, fontWeight: 900, letterSpacing: 12, padding: 30, background: "#000", borderRadius: 20, marginBottom: 40 }}>{roomId}</div>
                            <div style={{ color: "#666", letterSpacing: 2 }}>Waiting for players... ({state.players.length}/4)</div>
                        </div>
                    </div>
                );
            }

            return (
                <div style={{ padding: 40, textAlign: "center" }}>
                    <div style={{ marginBottom: 20 }}>
                        <div style={{ fontSize: 24, fontWeight: 900 }}>Turn: {state.players[state.turn]}</div>
                        <div style={{ marginTop: 10 }}>Dice: <span style={{ fontSize: 48 }}>{state.currentDice}</span></div>
                        {state.turn === playerIndex && (
                            <div style={{ marginTop: 20 }}>
                                {!state.diceRolled ? <button onClick={roll} style={{ padding: "10px 30px", background: "#fff", color: "#000", fontWeight: 900 }}>ROLL DICE</button> : 
                                <div style={{ display: "flex", justifyContent: "center", gap: 10 }}>
                                    {[0,1,2,3].map(i => <button key={i} onClick={()=>move(i)} style={{ padding: "10px 20px", background: "#ffc107" }}>Move P{i+1}</button>)}
                                </div>}
                            </div>
                        )}
                    </div>
                    {/* Simplified Board View */}
                    <div style={{ width: 400, height: 400, background: "#fff", margin: "0 auto", border: "10px solid #333", display: "flex", flexWrap: "wrap" }}>
                         {state.players.map((p, i) => (
                             <div key={i} style={{ width: "50%", height: "50%", border: "2px solid #000", position: "relative", background: i===0?'#ff4d4d':i===1?'#4dff4d':i===2?'#ffcc00':'#4d94ff' }}>
                                 <div style={{ position: "absolute", top: 10, left: 10, fontWeight: 900 }}>{p}</div>
                                 <div style={{ display: "flex", justifyContent: "center", alignItems: "center", height: "100%", gap: 10 }}>
                                     {state.pieces[i].map((pos, j) => <div key={j} style={{ width: 20, height: 20, borderRadius: 10, background: "#fff", border: "2px solid #000", fontSize: 10 }}>{pos}</div>)}
                                 </div>
                             </div>
                         ))}
                    </div>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState("lobby");
            const [data, setData] = useState(null);
            if (view === "lobby") return <Lobby onEnterGame={(roomId, playerIndex, playerName) => { setData({ roomId, playerIndex, playerName }); setView("game"); }} />;
            return <Game {...data} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        /*]]>*/
    </script>
</body>
</html>

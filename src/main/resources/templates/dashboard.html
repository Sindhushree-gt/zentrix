<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Zentrix Elite</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script th:inline="javascript">
        var contextPath = /*[[@{/}]]*/ '';
        if(contextPath === '/') contextPath = '';
    </script>
    <style>
        .vote-section-elite { background: white; border: 1px solid var(--border); border-radius: 25px; padding: 25px; margin-bottom: 30px; }
        .vote-grid-elite { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .vote-card-elite { min-width: 200px; background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 15px; text-align: center; flex-shrink: 0; transition: all 0.3s; }
        .btn-vote-elite { width: 100%; margin-top: 10px; padding: 8px; background: var(--primary); color: white; border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; border: none; }
        .post-card-elite { background: white; padding: 35px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 30px; }
        .action-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 5px; transition: color 0.2s; }
        .action-btn:hover { color: var(--primary); }
        .action-btn.liked { color: #f84464; }
        .filter-chip { padding: 6px 12px; border-radius: 20px; background: var(--secondary); color: var(--primary-dark); font-size: 11px; font-weight: 800; display: inline-flex; align-items: center; gap: 8px; text-decoration: none; }
        .widgets { padding: 30px; }
        .widget-card { background: white; padding: 25px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 30px; }
        .widget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .widget-header h3 { font-size: 14px; font-weight: 900; }
        .see-all { font-size: 11px; color: var(--primary); font-weight: 800; text-decoration: none; }
        .suggestion-item { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .suggestion-user { display: flex; align-items: center; gap: 10px; }
        .suggestion-user img { width: 35px; height: 35px; border-radius: 50%; }
        .follow-btn { background: var(--primary); color: white; border: none; border-radius: 10px; padding: 6px 15px; font-size: 10px; font-weight: 800; cursor: pointer; }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> ZENTRIX</div>
        <div style="flex: 1; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 20px;">
            <a th:href="@{/logout}" style="color: var(--text-muted); font-weight: 800; text-decoration: none; font-size: 13px;">LOGOUT</a>
            <a th:href="@{/profile}">
                <img th:src="${session.user.profilePhotoUrl != null} ? ${session.user.profilePhotoUrl} : 'https://ui-avatars.com/api/?name=User&background=10B981&color=fff'" 
                     style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--secondary);">
            </a>
        </div>
    </nav>

    <div class="app-wrapper">
        <aside class="sidebar">
            <a th:href="@{/dashboard}" class="sidebar-link active"><i class="fas fa-home"></i> <span>Feed</span></a>
            <a th:href="@{/explore}" class="sidebar-link"><i class="fas fa-compass"></i> <span>Explore</span></a>
            <a th:href="@{/reels}" class="sidebar-link"><i class="fas fa-film"></i> <span>Reels</span></a>
            <a th:href="@{/events}" class="sidebar-link"><i class="fas fa-calendar-alt"></i> <span>Events</span></a>
            <a th:href="@{/games}" class="sidebar-link"><i class="fas fa-gamepad"></i> <span>Games</span></a>
            <a th:href="@{/music}" class="sidebar-link"><i class="fas fa-music"></i> <span>Music</span></a>
            <a th:href="@{/achievements}" class="sidebar-link"><i class="fas fa-medal"></i> <span>Awards</span></a>
            <a th:href="@{/profile}" class="sidebar-link"><i class="fas fa-user-circle"></i> <span>Profile</span></a>
            <a href="#" class="sidebar-link" onclick="openCreateModal()"><i class="fas fa-plus-circle"></i> <span>Create</span></a>
            <a th:href="@{/logout}" class="sidebar-link" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></a>
        </aside>

        <main class="content-main">
            <!-- Voting Section -->
            <div th:if="${votingPolls != null and !votingPolls.isEmpty()}" class="vote-section-elite">
                <h3 style="font-size: 14px; font-weight: 800; margin-bottom: 15px;">Active Voting Polls</h3>
                <div class="vote-grid-elite">
                    <div th:each="poll : ${votingPolls}" class="vote-card-elite">
                        <h4 th:text="${poll.title}" style="font-size: 12px; margin-bottom: 10px;">Poll</h4>
                        <form th:action="@{'/events/' + ${poll.id} + '/poll-vote'}" method="POST">
                            <button type="submit" class="btn-vote-elite">VOTE</button>
                        </form>
                    </div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 40px;">
                <!-- Main Feed Area -->
                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <h2 style="font-size: 2rem; font-weight: 900;">Social <span style="color: var(--primary);">Feed</span></h2>
                        <div th:if="${activeCategory != null}" class="filter-chip">
                            <span th:text="${activeCategory}">Category</span>
                            <a th:href="@{/dashboard}" style="color: inherit; text-decoration: none;">×</a>
                        </div>
                    </div>
                    
                    <div th:each="post : ${posts}" class="post-card-elite" th:attr="data-post-id=${post.id}">
                        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                            <img th:src="${post.user.profilePhotoUrl != null ? post.user.profilePhotoUrl : 'https://ui-avatars.com/api/?name='+post.user.username + '&background=10B981&color=fff'}" 
                                 style="width:45px;height:45px;border-radius:50%;object-fit:cover;">
                            <div>
                                <div th:text="${post.user.username}" style="font-weight: 800; font-size: 15px;">Username</div>
                                <div style="font-size: 11px; color: var(--text-muted);" th:text="${#temporals.format(post.createdAt, 'dd MMM • HH:mm')}">Date</div>
                            </div>
                        </div>
                        <p th:text="${post.content}" style="font-size: 15px; line-height: 1.7; color: var(--text-main); margin-bottom: 20px;">Post content...</p>
                        <div th:if="${post.mediaUrl != null}" style="margin: 0 -35px 20px; background: #000; border-radius: 5px; overflow: hidden;">
                            <img th:if="${post.mediaType == 'IMAGE'}" th:src="@{${post.mediaUrl}}" style="width: 100%; max-height: 500px; object-fit: contain;">
                            <video th:if="${post.mediaType == 'VIDEO'}" th:src="@{${post.mediaUrl}}" controls style="width: 100%;"></video>
                        </div>
                        <div style="display: flex; gap: 20px; border-top: 1px solid var(--border); padding-top: 20px;">
                            <button class="action-btn" th:id="'like-btn-' + ${post.id}" th:onclick="'toggleLike(' + ${post.id} + ')'" th:classappend="${post.isLikedByUser(session.user)} ? 'liked' : ''">
                                <i th:class="${post.isLikedByUser(session.user)} ? 'fas fa-heart' : 'far fa-heart'"></i>
                                <span th:id="'like-count-' + ${post.id}" th:text="${post.likes != null ? post.likes.size() : 0}">0</span>
                            </button>
                            <button class="action-btn" th:onclick="'openComments(' + ${post.id} + ')'">
                                <i class="far fa-comment"></i>
                                <span th:text="${post.comments != null ? post.comments.size() : 0}">0</span>
                            </button>
                            <button class="action-btn" style="margin-left: auto; color: var(--primary);">
                                <i class="far fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Right Widgets -->
                <aside class="widgets">
                    <div class="widget-card">
                        <div class="widget-header">
                            <h3>Ongoing Battles</h3>
                            <a th:href="@{/music}" class="see-all">Explore</a>
                        </div>
                        <div th:each="r : ${ongoingMusicBattles}" style="margin-bottom: 15px; padding: 12px; background: #f9fafb; border-radius: 15px; display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div th:text="${r.name}" style="font-size: 13px; font-weight: 800;">Battle</div>
                                <div style="font-size: 10px; color: var(--text-muted);" th:text="${r.phase}">Phase</div>
                            </div>
                            <a th:href="@{'/music/rooms/' + ${r.code}}" class="follow-btn">JOIN</a>
                        </div>
                    </div>

                    <div class="widget-card">
                        <div class="widget-header">
                            <h3>Trending Events</h3>
                            <a th:href="@{/events}" class="see-all">All</a>
                        </div>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <img src="https://images.unsplash.com/photo-1540039155733-5bb30b53aa14?q=80&w=200&auto=format&fit=crop" style="width: 50px; height: 50px; border-radius: 12px; object-fit: cover;">
                            <div>
                                <div style="font-size: 13px; font-weight: 800;">Neon Fest</div>
                                <div style="font-size: 10px; color: var(--primary); font-weight: 800;">AUG 24</div>
                            </div>
                        </div>
                    </div>

                    <div class="widget-card">
                        <div class="widget-header">
                            <h3>Suggested Squad</h3>
                            <a th:href="@{/explore}" class="see-all">See All</a>
                        </div>
                        <div class="suggestion-item" th:each="u : ${suggestions}">
                            <div class="suggestion-user">
                                <img th:src="'https://ui-avatars.com/api/?name=' + ${u.username} + '&background=10B981&color=fff'" alt="">
                                <span th:text="${u.username}" style="font-size: 12px; font-weight: 800;">user</span>
                            </div>
                            <button class="follow-btn" th:onclick="'followUserAjax(' + ${u.id} + ', this)'">FOLLOW</button>
                        </div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <!-- Create Modal -->
    <div id="createPostModal" class="widget-card" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 4000; width: 500px; padding: 40px; box-shadow: 0 0 100px rgba(0,0,0,0.2);">
        <div class="widget-header">
            <h3>Create New Post</h3>
            <i class="fas fa-times" onclick="closeCreateModal()" style="cursor: pointer;"></i>
        </div>
        <form th:action="@{/profile/post}" method="POST" enctype="multipart/form-data">
            <textarea name="content" placeholder="Share something epic..." required style="width: 100%; height: 150px; border-radius: 15px; border: 1px solid var(--border); padding: 15px; margin-bottom: 20px; font-family: inherit; font-size: 14px; outline: none;"></textarea>
            <input type="file" name="media" style="margin-bottom: 20px;">
            <button type="submit" class="cta-btn" style="width: 100%; border: none; cursor: pointer;">POST NOW</button>
        </form>
    </div>
    <div id="overlay" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 3999;" onclick="closeCreateModal()"></div>

    <script th:inline="javascript">
        const FEED_USER_ID = /*[[${session.user.id}]]*/ 0;

        function openCreateModal() {
            document.getElementById('createPostModal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }
        function closeCreateModal() {
            document.getElementById('createPostModal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        async function toggleLike(postId) {
            try {
                const res = await fetch('/api/posts/' + postId + '/like', { method: 'POST' });
                const data = await res.json();
                const btn = document.getElementById('like-btn-' + postId);
                const count = document.getElementById('like-count-' + postId);
                const icon = btn.querySelector('i');
                
                count.textContent = data.likeCount;
                if (data.liked) {
                    btn.classList.add('liked');
                    icon.className = 'fas fa-heart';
                    recordFeedActivity(postId, 'LIKE');
                } else {
                    btn.classList.remove('liked');
                    icon.className = 'far fa-heart';
                }
            } catch (e) { console.error(e); }
        }

        async function recordFeedActivity(postId, action, watchTimeSeconds = 0) {
            if (!FEED_USER_ID || !postId) return;
            try {
                fetch('/api/feed/activity', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: FEED_USER_ID, postId: postId, action: action, watchTime: watchTimeSeconds })
                });
            } catch (e) {}
        }

        // View tracking
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const postId = entry.target.getAttribute('data-post-id');
                    recordFeedActivity(postId, 'VIEW');
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.post-card-elite').forEach(c => observer.observe(c));

        async function followUserAjax(userId, btn) {
            try {
                const res = await fetch('/profile/' + userId + '/follow/ajax', { method: 'POST' });
                const data = await res.json();
                btn.textContent = data.status === 'REQUESTED' ? 'PENDING' : 'FOLLOWING';
                btn.style.background = '#f1f5f9';
                btn.style.color = '#64748b';
            } catch (e) {}
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zentrix Elite</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F0FDF4 0%, #D1FAE5 100%);
            margin: 0;
        }

        .auth-card {
            background: white;
            padding: 50px;
            border-radius: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 40px 100px rgba(6, 78, 59, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.1);
            text-align: center;
        }

        .auth-logo {
            font-size: 28px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 40px;
            letter-spacing: -1.5px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 16px;
            border: 2px solid #F3F4F6;
            background: #F9FAFB;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            background: var(--primary-dark);
        }

        .auth-footer {
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-logo"><i class="fas fa-bolt"></i> ZENTRIX ELITE</div>
        <h2 style="font-size: 32px; font-weight: 900; margin-bottom: 10px;">Welcome Back</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Great to see you again! Log in to your portal.</p>

        <div th:if="${param.error}" 
             style="background: #FEF2F2; color: #EF4444; padding: 12px; border-radius: 12px; font-size: 14px; margin-bottom: 20px; font-weight: 600;">
            Invalid username or password. Try again!
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">USERNAME / EMAIL</label>
                <input type="text" id="username" name="username" placeholder="e.g. janesmith" required>
            </div>

            <div class="form-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="auth-btn">SECURE LOG IN</button>
        </form>

        <div class="auth-footer">
            Don't have an elite account? <a th:href="@{/register}">Create One Now</a>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | TalentShowcase</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            background: rgba(248, 68, 100, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 24px;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
        }

        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .data-table th {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-active {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
        }

        .status-pending {
            background: rgba(241, 196, 15, 0.2);
            color: #f1c40f;
        }

        .status-banned {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">Zentrix<span>Admin</span></div>
        <div class="nav-links">
            <a href="/events/admin/manage" style="color: var(--accent); font-weight: 700;"><i
                    class="fas fa-calendar-alt"></i> Manage Events</a>
            <a href="/events/admin/create" class="nav-btn" style="padding: 8px 18px; text-decoration: none;"><i
                    class="fas fa-plus"></i> Create Event</a>
            <a href="/dashboard">Return to App</a>
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="container" style="margin-top: 20px;">

        <h1 style="margin-bottom: 30px;">Platform Overview</h1>

        <!-- Stats -->
        <div class="admin-stats">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div>
                    <h3 style="font-size: 24px;" th:text="${users.size()}">0</h3>
                    <span style="color: var(--text-secondary); font-size: 14px;">Total Users</span>
                </div>
            </div>
            <div class="stat-card" style="cursor:pointer;" onclick="location.href='/events/admin/manage'">
                <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                <div>
                    <h3 style="font-size: 24px;" th:text="${totalEvents}">0</h3>
                    <span style="color: var(--text-secondary); font-size: 14px;">Total Events</span>
                </div>
            </div>
            <div class="stat-card" style="cursor:pointer;"
                onclick="location.href='/events/admin/manage?status=UPCOMING'">
                <div class="stat-icon" style="background: rgba(59,130,246,0.12);"><i class="fas fa-hourglass-start"
                        style="color:#3b82f6;"></i></div>
                <div>
                    <h3 style="font-size: 24px;" th:text="${upcomingEvents}">0</h3>
                    <span style="color: var(--text-secondary); font-size: 14px;">Upcoming Events</span>
                </div>
            </div>
            <div class="stat-card" style="cursor:pointer;"
                onclick="location.href='/events/admin/manage?status=ONGOING'">
                <div class="stat-icon" style="background: rgba(245,158,11,0.12);"><i class="fas fa-circle-notch"
                        style="color:#f59e0b;"></i></div>
                <div>
                    <h3 style="font-size: 24px;" th:text="${ongoingEvents}">0</h3>
                    <span style="color: var(--text-secondary); font-size: 14px;">Ongoing Events</span>
                </div>
            </div>
        </div>

        <!-- Event Quick Actions -->
        <div style="display:flex; gap:15px; margin-bottom: 36px; flex-wrap: wrap;">
            <a href="/events/admin/create" style="display:inline-flex; align-items:center; gap:10px; padding: 14px 28px;
                      background: linear-gradient(135deg,#f84464,#ff6b9d); color:#fff;
                      border-radius:14px; font-weight:800; text-decoration:none;
                      box-shadow: 0 4px 20px rgba(248,68,100,0.4); font-size:15px;">
                <i class="fas fa-plus-circle"></i> Create New Event
            </a>
            <a href="/events/admin/manage" style="display:inline-flex; align-items:center; gap:10px; padding: 14px 28px;
                      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
                      color:rgba(255,255,255,0.8); border-radius:14px; font-weight:700;
                      text-decoration:none; font-size:15px;">
                <i class="fas fa-calendar-alt"></i> Manage All Events
            </a>
        </div>

        <!-- Recent Users -->
        <h2 style="margin-bottom: 20px;">Recent Registrations</h2>
        <table class="data-table">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td style="display: flex; align-items: center; gap: 10px;">
                        <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?q=80&w=1780&auto=format&fit=crop"
                            style="width: 32px; height: 32px; border-radius: 50%;">
                        <span th:text="${user.username}">Username</span>
                    </td>
                    <td th:text="${user.email}">user@example.com</td>
                    <td>User</td>
                    <td th:text="${user.dob}">2024-01-01</td>
                    <td><span class="status-badge status-active">Active</span></td>
                    <td><button class="nav-btn" style="padding: 4px 10px; font-size: 12px;">Edit</button></td>
                </tr>
            </tbody>
        </table>

    </div>

</body>

</html>

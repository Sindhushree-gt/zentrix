<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Awards | Zentrix Elite</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> ZENTRIX</div>
        <div style="flex: 1; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 20px;">
            <a th:href="@{/logout}" style="color: var(--text-muted); font-weight: 800; text-decoration: none; font-size: 13px;">LOGOUT</a>
            <a th:href="@{/profile}">
                <img th:src="${user.profilePhotoUrl != null} ? ${user.profilePhotoUrl} : 'https://ui-avatars.com/api/?name=User&background=10B981&color=fff'" 
                     style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--secondary);">
            </a>
        </div>
    </nav>

    <div class="app-wrapper">
        <!-- RESTORED OLD SIDEBAR -->
        <aside class="sidebar">
            <a th:href="@{/dashboard}" class="sidebar-link"><i class="fas fa-home"></i> <span>Feed</span></a>
            <a th:href="@{/explore}" class="sidebar-link"><i class="fas fa-compass"></i> <span>Explore</span></a>
            <a th:href="@{/events}" class="sidebar-link"><i class="fas fa-calendar-alt"></i> <span>Events</span></a>
            <a th:href="@{/achievements}" class="sidebar-link active"><i class="fas fa-medal"></i> <span>Awards</span></a>
            <a th:href="@{/profile}" class="sidebar-link"><i class="fas fa-user-circle"></i> <span>Profile</span></a>
            <a th:href="@{/logout}" class="sidebar-link" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></a>
        </aside>

        <main class="content-main">
            <div style="background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); padding: 50px; border-radius: 30px; color: white; display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; box-shadow: 0 20px 40px rgba(16,185,129,0.2);">
                <div>
                    <h3 style="font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8;">CURRENT STATUS</h3>
                    <h2 style="font-size: 36px; font-weight: 900; margin-top: 5px;" th:text="${user.level != null ? user.level : 'Novice'} + ' Tier'">Novice Tier</h2>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 50px; font-weight: 900;"><i class="fas fa-bolt" style="color: var(--accent);"></i> <span th:text="${user.xp != null ? user.xp : 0}">0</span></div>
                    <div style="font-size: 11px; font-weight: 800; opacity: 0.7; letter-spacing: 1px;">ELITE EXPERIENCE POINTS</div>
                </div>
            </div>

            <h2 style="font-size: 1.5rem; font-weight: 900; margin-bottom: 30px;">Global <span style="color: var(--primary);">Leaderboard</span></h2>
            <div style="background: white; border-radius: 25px; border: 1px solid var(--border); overflow: hidden;">
                <div th:each="player, iter : ${leaderboard}" style="display: flex; align-items: center; padding: 25px 35px; border-bottom: 1px solid var(--border); transition: 0.3s; cursor: pointer;">
                    <div style="width: 50px; font-weight: 900; font-size: 18px; color: var(--text-muted);" th:classappend="${iter.index == 0 ? 'color:var(--accent)' : ''}" th:text="${iter.index + 1}">1</div>
                    <div style="display: flex; align-items: center; gap: 15px; flex: 1;">
                        <img th:src="${player.profilePhotoUrl != null ? player.profilePhotoUrl : 'https://ui-avatars.com/api/?name='+player.username}" style="width: 40px; height: 40px; border-radius: 50%;">
                        <div>
                            <div th:text="${player.username}" style="font-weight: 800; font-size: 15px;">Username</div>
                            <div style="font-size: 11px; color: var(--text-muted); font-weight: 700;" th:text="${player.level != null ? player.level : 'Novice'}">Tier</div>
                        </div>
                    </div>
                    <div style="font-weight: 900; font-size: 18px; color: var(--text-main);"><i class="fas fa-bolt" style="color: var(--accent);"></i> <span th:text="${player.xp != null ? player.xp : 0}">0</span></div>
                </div>
            </div>
        </main>
    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Zentrix Elite</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #F0FDF4 0%, #D1FAE5 100%);
            margin: 0;
        }

        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 32px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 40px 100px rgba(6, 78, 59, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.1);
            text-align: center;
        }

        .auth-logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 25px;
            letter-spacing: -1.5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            text-align: left;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 13px;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid #F3F4F6;
            background: #F9FAFB;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            background: var(--primary-dark);
        }

        .auth-footer {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="auth-logo"><i class="fas fa-bolt"></i> ZENTRIX ELITE</div>
        <h2 style="font-size: 28px; font-weight: 900; margin-bottom: 8px;">Create Account</h2>
        <p style="color: var(--text-muted); margin-bottom: 25px;">Enter the elite circle today.</p>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="username">USERNAME</label>
                    <input type="text" id="username" th:field="*{username}" placeholder="e.g. gamer_pro" required>
                </div>

                <div class="form-group full-width">
                    <label for="email">EMAIL ADDRESS</label>
                    <input type="email" id="email" th:field="*{email}" placeholder="hello@example.com" required>
                </div>

                <div class="form-group full-width">
                    <label for="password">SECURE PASSWORD</label>
                    <input type="password" id="password" th:field="*{password}" placeholder="Create a strong password" required>
                </div>

                <div class="form-group">
                    <label for="dob">DATE OF BIRTH</label>
                    <input type="date" id="dob" th:field="*{dob}" required>
                </div>

                <div class="form-group">
                    <label for="gender">GENDER</label>
                    <select id="gender" th:field="*{gender}" required>
                        <option value="" disabled selected>Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="auth-btn">CREATE ELITE PROFILE</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a th:href="@{/login}">Sign In Here</a>
        </div>
    </div>

</body>
</html>

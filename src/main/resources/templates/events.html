<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | Zentrix Elite</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .event-grid-app {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 40px;
        }
        @media (max-width: 1400px) { .event-grid-app { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 900px) { .event-grid-app { grid-template-columns: 1fr; } }
    </style>
    <script th:src="@{/js/tab-support.js}"></script>
</head>

<body>

    <nav class="navbar">
        <div class="logo"><i class="fas fa-bolt"></i> ZENTRIX</div>
        <div style="flex: 1; text-align: right; display: flex; align-items: center; justify-content: flex-end; gap: 20px;">
            <a th:href="@{/logout}" style="color: var(--text-muted); font-weight: 800; text-decoration: none; font-size: 13px;">LOGOUT</a>
            <a th:href="@{/profile}">
                <img th:src="${user.profilePhotoUrl != null} ? ${user.profilePhotoUrl} : 'https://ui-avatars.com/api/?name=User&background=10B981&color=fff'" 
                     style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--secondary);">
            </a>
        </div>
    </nav>

    <div class="app-wrapper">
        <!-- RESTORED OLD SIDEBAR -->
        <aside class="sidebar">
            <a th:href="@{/dashboard}" class="sidebar-link"><i class="fas fa-home"></i> <span>Feed</span></a>
            <a th:href="@{/events}" class="sidebar-link active"><i class="fas fa-calendar-alt"></i> <span>Events</span></a>
            <a th:href="@{/achievements}" class="sidebar-link"><i class="fas fa-medal"></i> <span>Awards</span></a>
            <a th:href="@{/profile}" class="sidebar-link"><i class="fas fa-user-circle"></i> <span>Profile</span></a>
            <a th:href="@{/logout}" class="sidebar-link" style="margin-top: auto;"><i class="fas fa-sign-out-alt"></i> <span>Log Out</span></a>
        </aside>

        <!-- CONTENT AREA WITH NEW GRID -->
        <main class="content-main">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
                <h1 style="font-size: 2.5rem; font-weight: 900;">Elite <span style="color: var(--primary);">Showdowns</span></h1>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-primary-elite">UPCOMING</button>
                    <button class="btn-primary-elite" style="background: #eee; color: #888;">PAST</button>
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 40px; overflow-x: auto; padding-bottom: 10px;">
                <button class="btn-primary-elite" style="padding: 8px 20px; font-size: 12px;">All Events</button>
                <button class="btn-primary-elite" style="padding: 8px 20px; font-size: 12px; background: white; color: #888; border: 1px solid #ddd;">Gaming</button>
                <button class="btn-primary-elite" style="padding: 8px 20px; font-size: 12px; background: white; color: #888; border: 1px solid #ddd;">Tech</button>
            </div>

            <div class="event-grid-app">
                <div th:each="event : ${events}" class="card-elite">
                    <div class="card-img-wrap">
                        <img th:src="${event.imageUrl}" onerror="this.src='https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=600'">
                    </div>
                    <div class="card-body-elite">
                        <span class="badge-elite" th:text="${event.category}">Category</span>
                        <h3 th:text="${event.title}" style="font-size: 20px; font-weight: 900; margin-bottom: 15px;">Event Title</h3>
                        <p style="font-size: 14px; color: var(--text-muted); line-height: 1.6; margin-bottom: 25px;">Join the elite gathering and showcase your skills to the community.</p>
                        <a th:href="@{'/events/' + ${event.id}}" style="color: var(--primary); font-weight: 900; text-decoration: none; font-size: 13px; margin-top: auto;">RESERVE SPOT &rarr;</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>

</html>
